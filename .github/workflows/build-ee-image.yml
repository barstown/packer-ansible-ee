name: Build and Publish EE Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-builder
        run: pip install ansible-builder

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create date tag
        id: date
        run: |
          echo "tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build image with latest tag
        run: |
          ansible-builder build -v3 --container-runtime docker -t "$IMAGE_NAME:latest"

      - name: Detect Packer version from image
        id: packer
        run: |
          version="$(docker run --rm "$IMAGE_NAME:latest" packer version | awk 'NR==1 {sub(/^v/, "", $2); print $2}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          {
            echo "## Image build metadata"
            echo "- Date tag: ${{ steps.date.outputs.tag }}"
            echo "- Packer version: $version"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Add date and version tags
        run: |
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:${{ steps.date.outputs.tag }}"
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:packer-${{ steps.packer.outputs.version }}"
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:${{ steps.date.outputs.tag }}-packer-${{ steps.packer.outputs.version }}"

      - name: Push tags to GHCR
        run: |
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ steps.date.outputs.tag }}"
          docker push "$IMAGE_NAME:packer-${{ steps.packer.outputs.version }}"
          docker push "$IMAGE_NAME:${{ steps.date.outputs.tag }}-packer-${{ steps.packer.outputs.version }}"
