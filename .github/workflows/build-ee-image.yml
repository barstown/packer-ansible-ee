name: Build and Publish EE Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-builder
        run: pip install ansible-builder

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create CalVer tags
        id: calver
        run: |
          echo "month=$(date -u +%y.%m)" >> "$GITHUB_OUTPUT"
          echo "day=$(date -u +%y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Build image with latest tag
        run: |
          ansible-builder build -v3 --container-runtime docker -t "$REGISTRY/$IMAGE_NAME:latest"

      - name: Detect Packer version from image
        id: packer
        run: |
          version="$(docker run --rm "$REGISTRY/$IMAGE_NAME:latest" packer version | awk 'NR==1 {sub(/^v/, "", $2); print $2}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Add OCI labels
        run: |
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          container_id="$(docker create "$REGISTRY/$IMAGE_NAME:latest")"
          docker commit \
            --change "LABEL org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --change "LABEL org.opencontainers.image.revision=${{ github.sha }}" \
            --change "LABEL org.opencontainers.image.created=$created" \
            --change "LABEL org.opencontainers.image.version=${{ steps.calver.outputs.day }}-${{ steps.packer.outputs.version }}" \
            --change "LABEL org.opencontainers.image.description=\"Packer AWX execution environment\"" \
            "$container_id" "$REGISTRY/$IMAGE_NAME:latest" >/dev/null
          docker rm "$container_id" >/dev/null

      - name: Add CalVer and version tags
        run: |
          docker tag "$REGISTRY/$IMAGE_NAME:latest" "$REGISTRY/$IMAGE_NAME:${{ steps.calver.outputs.month }}"
          docker tag "$REGISTRY/$IMAGE_NAME:latest" "$REGISTRY/$IMAGE_NAME:${{ steps.calver.outputs.day }}-${{ steps.packer.outputs.version }}"

      - name: Push tags to GHCR
        run: |
          docker push "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.calver.outputs.month }}"
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.calver.outputs.day }}-${{ steps.packer.outputs.version }}"
