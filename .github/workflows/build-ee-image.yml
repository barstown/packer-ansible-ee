name: Build and Publish EE Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-builder
        run: pip install ansible-builder

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create date tag
        id: date
        run: |
          echo "tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build image with latest tag
        run: |
          ansible-builder build -v3 --container-runtime docker -t "$REGISTRY/$IMAGE_NAME:latest"

      - name: Detect Packer version from image
        id: packer
        run: |
          version="$(docker run --rm "$REGISTRY/$IMAGE_NAME:latest" packer version | awk 'NR==1 {sub(/^v/, "", $2); print $2}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Add date and version tags
        run: |
          docker tag "$REGISTRY/$IMAGE_NAME:latest" "$REGISTRY/$IMAGE_NAME:${{ steps.date.outputs.tag }}"
          docker tag "$REGISTRY/$IMAGE_NAME:latest" "$REGISTRY/$IMAGE_NAME:${{ steps.date.outputs.tag }}-packer-${{ steps.packer.outputs.version }}"

      - name: Push tags to GHCR
        run: |
          docker push "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.date.outputs.tag }}"
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.date.outputs.tag }}-packer-${{ steps.packer.outputs.version }}"
